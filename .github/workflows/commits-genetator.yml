name: Generate Commits

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Allow github-actions[bot] to push commits
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: konradlinkowski/contributionsgenerator@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GIT_NAME: Trilleo
          GIT_EMAIL: gongsanle@gmail.com
          COMMITS: 28
